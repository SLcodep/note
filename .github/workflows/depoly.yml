name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]

# 设置token访问权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    # 确保构建失败时立即终止
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级到最新版
        with:
          fetch-depth: 0 # 启用lastUpdated需要

      - name: Setup pnpm
        uses: pnpm/action-setup@v3 # 升级到最新版
        with:
          version: 10.11.1 # 与你Cloudflare环境一致的版本

      - name: Setup Node
        uses: actions/setup-node@v4 # 升级到最新版
        with:
          node-version: 22 # 与你Cloudflare环境一致的版本
          cache: pnpm # 缓存pnpm依赖

      - name: Setup Pages
        uses: actions/configure-pages@v4 # 升级到最新版

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # 锁定依赖版本，避免意外更新

      - name: Build with VitePress
        run: |
          pnpm run docs:build
          # 关键：把.nojekyll创建到构建产物目录中
          touch docs/.vitepress/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist # 产物路径正确

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 最新稳定版
